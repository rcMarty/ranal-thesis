name: Compile LaTeX (Master)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-latex:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX Live and Pygments
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-extra texlive-xetex texlive-fonts-recommended \
            texlive-fonts-extra texlive-science latexmk python3-pygments \
            make

      - name: Build PDF with latexmk
        working-directory: ./src
        run: |
          latexmk -pdf -xelatex -shell-escape -interaction=nonstopmode main.tex

      - name: Prepare GitHub Pages publish dir
        run: |
          mkdir -p public
          cp src/main.pdf public/

      - name: Upload artifact (PDF)
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: src/main.pdf

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: public
