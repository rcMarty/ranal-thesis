name: Compile LaTeX

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-latex:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Compiling LaTeX documents
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: src
          args: -pdf -halt-on-error -synctex=1 -interaction=nonstopmode --shell-escape --enable-write18
          extra_system_packages: 'inkscape openjdk17 py3-pygments font-dejavu'

      - name: Upload LaTeX PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: src/main.pdf
          if-no-files-found: error

  publish-release:
    needs: build-latex
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: thesis-pdf
          path: src

      - name: Publish PDF to GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest Thesis PDF
          body: Automatically updated thesis PDF from `${{ github.ref_name }}`.
          allowUpdates: true
          removeArtifacts: true
          artifacts: src/main.pdf

  publish-revision-release:
    needs: build-latex
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/revision-')
    steps:
      - name: Download PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: thesis-pdf
          path: src

      - name: Publish PDF to revision release
        uses: ncipollo/release-action@v1
        with:
          tag: revision-latest
          name: Latest Revision Thesis PDF
          body: Automatically updated thesis PDF from `${{ github.ref_name }}`.
          allowUpdates: true
          removeArtifacts: true
          artifacts: src/main.pdf
          prerelease: true
          makeLatest: false

  publish-pages:
    needs: build-latex
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: thesis-pdf
          path: src

      - name: Build GitHub Pages site
        run: |
          mkdir -p pages/pdf
          cp src/main.pdf pages/main.pdf
          if [ -f readme.md ]; then
            cp readme.md pages/README.md
          elif [ -f README.md ]; then
            cp README.md pages/README.md
          else
            printf '%s\n' '# README' '' 'README soubor nebyl v repozitáři nalezen.' > pages/README.md
          fi
          cat > pages/pdf/index.html <<'HTML'
          <!doctype html>
          <html lang="cs">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width,initial-scale=1" />
            <title>RANAL Thesis PDF</title>
            <style>
              html, body { margin: 0; height: 100%; background: #1f1f1f; }
              body { display: flex; flex-direction: column; font-family: system-ui, sans-serif; }
              header { padding: 0.75rem 1rem; background: #111; color: #fff; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
              header a { color: #fff; }
              iframe { flex: 1; width: 100%; border: 0; background: #666; }
            </style>
          </head>
          <body>
            <header>
              <strong>PDF náhled diplomové práce</strong>
              <a href="../">Zpět na hlavní stránku</a>
              <a href="../main.pdf" target="_blank" rel="noopener noreferrer">Otevřít PDF v nové kartě</a>
            </header>
            <iframe src="../main.pdf#view=FitH" title="PDF náhled diplomové práce"></iframe>
          </body>
          </html>
          HTML
          cat > pages/index.html <<'HTML'
          <!doctype html>
          <html lang="cs">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width,initial-scale=1" />
            <title>RANAL Thesis</title>
            <style>
              body { max-width: 960px; margin: 2rem auto; padding: 0 1rem 3rem; font-family: system-ui, sans-serif; line-height: 1.6; }
              nav { margin-bottom: 1.5rem; }
              nav a { margin-right: 1rem; }
              #readme { border-top: 1px solid #ddd; padding-top: 1rem; }
              .pdf-section { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #ddd; }
              .pdf-toolbar { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.75rem; }
              .pdf-toolbar a { padding: 0.65rem 1rem; border-radius: 0.5rem; border: 1px solid #bbb; background: #f5f5f5; color: #111; text-decoration: none; cursor: pointer; font: inherit; }
              .pdf-wrapper { width: 100%; height: min(60vh, 720px); border: 1px solid #ccc; border-radius: 0.75rem; overflow: hidden; background: #666; }
              .pdf-wrapper iframe { width: 100%; height: 100%; border: 0; background: #666; }
            </style>
            <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
          </head>
          <body>
            <h1>RANAL – diplomová práce</h1>
            <nav>
              <a href="pdf/">Otevřít plný PDF náhled</a>
              <a href="main.pdf" target="_blank" rel="noopener noreferrer">Otevřít PDF v nové kartě</a>
            </nav>

            <section id="readme">Načítání README…</section>

            <section class="pdf-section">
              <h2>PDF náhled práce</h2>
              <div class="pdf-toolbar">
                <a href="pdf/">Otevřít plný náhled práce</a>
                <a href="main.pdf" target="_blank" rel="noopener noreferrer">Stáhnout nebo otevřít PDF</a>
              </div>
              <div class="pdf-wrapper" id="pdf-wrapper">
                <iframe src="main.pdf#view=FitH" title="PDF náhled diplomové práce"></iframe>
              </div>
            </section>

            <script>
              fetch('README.md')
                .then(function(response) { return response.text(); })
                .then(function(markdown) {
                  document.getElementById('readme').innerHTML = marked.parse(markdown);
                })
                .catch(function() {
                  document.getElementById('readme').innerHTML = '<p>README se nepodařilo načíst.</p>';
                });
            </script>
          </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4